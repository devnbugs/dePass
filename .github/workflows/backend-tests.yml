name: Backend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: gatepassx_test
          MYSQL_USER: gatepassx
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, bcmath, openssl
          coverage: xdebug

      - name: Install dependencies
        run: |
          cd backend
          composer install --no-progress --prefer-dist

      - name: Setup environment
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_DATABASE=database\/database.sqlite/DB_DATABASE=gatepassx_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=gatepassx/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=password/' .env

      - name: Run migrations
        run: |
          cd backend
          php artisan migrate --force

      - name: Run tests
        run: |
          cd backend
          php artisan test --coverage

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring

      - name: Install dependencies
        run: |
          cd backend
          composer install --no-progress --prefer-dist

      - name: Run Laravel Pint
        run: |
          cd backend
          ./vendor/bin/pint --test

      - name: Run PHPStan
        run: |
          cd backend
          ./vendor/bin/phpstan analyse --memory-limit=512M